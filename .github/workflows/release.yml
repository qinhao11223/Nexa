name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean dist
        run: |
          Remove-Item -Recurse -Force dist, dist-electron -ErrorAction SilentlyContinue

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-beta-') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          files: |
            dist-electron/*.exe
            dist-electron/latest.yml
            dist-electron/*.blockmap
